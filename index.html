<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王爺開示 靈籤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微軟正黑體", "標楷體", serif;
        }
        body {
            background: #f9f1e3;
            min-height: 100vh;
            padding: 20px 10px;
        }
        .wrap {
            max-width: 620px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(139, 26, 26, 0.25);
            border: 2px solid #c83232;
        }
        h1 {
            color: #a81c1c;
            text-align: center;
            font-size: 32px;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }
        .tip {
            text-align: center;
            color: #777;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* 王爺神像區 */
        .god-section {
            text-align: center;
            margin: 30px 0;
        }
        #god-img {
            width: 220px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .bow-animation {
            animation: bow 0.8s ease-in-out;
        }
        @keyframes bow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* 按鈕樣式 */
        .god-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .god-btn {
            background: #c83232;
            color: #fff;
            border: none;
            font-size: 16px;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .god-btn:hover {
            background: #a81c1c;
        }

        /* 對話區 */
        .chat-box {
            margin-top: 20px;
            display: none;
        }
        #chat-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
        }
        #chat-submit {
            margin-top: 10px;
            background: #c83232;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        #chat-result {
            margin-top: 15px;
            padding: 15px;
            background: #fff5e6;
            border-radius: 8px;
            display: none;
            text-align: center;
            line-height: 2;
            font-size: 17px;
            white-space: pre-line;
        }

        /* 求籤區 */
        .stick-box {
            text-align: center;
            margin: 30px 0;
        }
        .stick-img {
            font-size: 80px;
            display: inline-block;
        }
        .shake {
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
            100% { transform: rotate(-8deg); }
        }
        #drawBtn {
            background: #b82222;
            color: #fff;
            border: none;
            font-size: 20px;
            padding: 14px 45px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        #drawBtn:hover {
            background: #d12c2c;
        }
        .result {
            margin-top: 35px;
            padding: 25px;
            background: #fff5e6;
            border-radius: 12px;
            border: 1px solid #e0c088;
            display: none;
            line-height: 2.2;
        }
        .lot-no {
            font-size: 24px;
            color: #a81c1c;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .poem-text {
            font-size: 18px;
            text-align: center;
            white-space: pre-line;
            color: #222;
        }
        .explain {
            margin-top: 20px;
            font-size: 17px;
            color: #444;
            text-align: left;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>王爺開示 靈籤</h1>
        <p class="tip">虔心祝禱，誠心求籤，心誠則靈</p>

        <!-- 音效物件 (隱藏) -->
        <audio id="soundBow" preload="auto">
            <source src="https://www.soundjay.com/ambient/bell-01.mp3" type="audio/mpeg">
        
        <audio id="soundShake" preload="auto">
            <source src="https://www.soundjay.com/mechanical/wood-creak-01.mp3" type="audio/mpeg">
        
        <audio id="soundResult" preload="auto">
            <source src="https://www.soundjay.com/ambient/gong-01.mp3" type="audio/mpeg">
        

        <!-- 王爺神像區 -->
        <div class="god-section">
            <img id="god-img" src="https://i.imgur.com/5ZJZQ4y.jpg" alt="王爺神像">
            <div class="god-buttons">
                <button class="god-btn" id="bowBtn">虔誠拜拜</button>
                <button class="god-btn" id="talkBtn">與王爺說話</button>
            </div>

            <!-- 對話輸入框 -->
            <div class="chat-box" id="chatBox">
                <textarea id="chat-input" rows="3" placeholder="在此寫下你想對王爺說的話..."></textarea>
                <button id="chat-submit">誠心稟告</button>
                <div id="chat-result"></div>
            </div>
        </div>

        <!-- 求籤區 -->
        <div class="stick-box">
            <div class="stick-img" id="stick">🎋</div>
            <br>
            <button id="drawBtn">搖筒求籤</button>
        </div>

        <div class="result" id="resultBox">
            <div class="lot-no" id="lotNum"></div>
            <div class="poem-text" id="lotPoem"></div>
            <div class="explain" id="lotExplain"></div>
        </div>

        <div class="footer">
            積善餘慶 · 諸事順遂
        </div>
    </div>
