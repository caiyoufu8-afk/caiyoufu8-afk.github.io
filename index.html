<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微軟正黑體", "標楷體", serif;
        }
        body {
            background: #f9f1e3;
            min-height: 100vh;
            padding: 20px 10px;
        }
        .wrap {
            max-width: 620px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(139, 26, 26, 0.25);
            border: 2px solid #c83232;
        }
        h1 {
            color: #a81c1c;
            text-align: center;
            font-size: 32px;
            letter-spacing: 6px;
            margin-bottom: 8px;
        }
        .tip {
            text-align: center;
            color: #777;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .stick-box {
            text-align: center;
            margin: 30px 0;
        }
        .stick-img {
            font-size: 80px;
            display: inline-block;
        }
        .shake {
            animation: shake 0.5s infinite;
        }
        @keyframes shake {
            0% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
            100% { transform: rotate(-8deg); }
        }
        #drawBtn {
            background: #b82222;
            color: #fff;
            border: none;
            font-size: 20px;
            padding: 14px 45px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            letter-spacing: 2px;
        }
        #drawBtn:hover {
            background: #d12c2c;
        }
        .result {
            margin-top: 35px;
            padding: 25px;
            background: #fff5e6;
            border-radius: 12px;
            border: 1px solid #e0c088;
            display: none;
            line-height: 2.2;
        }
        .lot-no {
            font-size: 24px;
            color: #a81c1c;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .poem-text {
            font-size: 18px;
            text-align: center;
            white-space: pre-line;
            color: #222;
        }
        .explain {
            margin-top: 20px;
            font-size: 17px;
            color: #444;
            text-align: left;
            border-top: 1px dashed #ccc;
            padding-top: 15px;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>

        <div class="stick-box">
            <div class="stick-img" id="stick">🎋</div>
            <br>
            <button id="drawBtn">搖筒求籤</button>
        </div>

        <div class="result" id="resultBox">
            <div class="lot-no" id="lotNum"></div>
            <div class="poem-text" id="lotPoem"></div>
            <div class="explain" id="lotExplain"></div>
        </div>

        <div class="footer">
            積善餘慶 · 諸事順遂
        </div>
    </div>
