// ========== 遊巡王爺 108首靈籤聖示（全主題涵蓋、不重複） ==========
const allLots = [
{num:"第一籤 上上",poem:`祥光滿路護君行，萬里雲開日月明。
立志向前無阻礙，功成業立享榮名。`,exp:`聖示：王爺巡境護身，大吉大利。事業順遂、財源穩進、姻緣和美、家宅平安。`},
{num:"第二籤 上上",poem:`勤耕本分福緣長，和氣生財滿室香。
出入平安無災厄，一門吉慶樂安康。`,exp:`聖示：正財旺、守財吉。穩定發展、不宜投機，家庭和睦運勢更旺。`},
{num:"第三籤 上上",poem:`良緣天定自相逢，心意相通意氣濃。
白首同心相伴老，紅鸞喜慶樂無窮。`,exp:`聖示：正緣到、姻緣吉。未婚得良人，已婚更和睦，舊情可圓滿。`},
{num:"第四籤 上上",poem:`神恩護體氣舒暢，遠離災病少憂傷。
心寬體健延年壽，四季平安福澤長。`,exp:`聖示：健康大吉，宿疾漸癒，養生順利，神尊護持無病煞。`},
{num:"第五籤 上上",poem:`祥光環繞入家門，闔室安然喜氣存。
宅宇清寧無雜擾，人財兩旺福根屯。`,exp:`聖示：家宅大吉，風水順，人口平安，遷居、房產皆順利。`},
{num:"第六籤 上上",poem:`貴人指引出迷津，遇事相扶得安心。
莫道前程多困阻，逢凶化吉有神臨。`,exp:`聖示：貴人運旺，長輩提攜，求職、升職、合作皆有人助。`},
{num:"第七籤 上吉",poem:`良機已至莫遲疑，順勢而行正合時。
把握今朝能得利，春風得意自相宜。`,exp:`聖示：時機已到，宜進取、創業、考試、轉職，動則得利。`},
{num:"第八籤 上吉",poem:`守心靜待好時光，莫貪妄動自安康。
穩中求勝方為上，靜裡藏福不用忙。`,exp:`聖示：宜守不宜進，以靜制動，守業、等待、穩財最吉。`},
{num:"第九籤 上吉",poem:`胸懷志氣向前奔，歷盡風霜終見春。
努力耕耘終有報，青雲有路可翻身。`,exp:`聖示：宜進取、打拼，苦盡甘來，自力更生終能成功。`},
{num:"第十籤 上吉",poem:`遠行一路保安康，策馬揚帆路正長。
出外求謀皆順遂，歸來滿載喜洋洋。`,exp:`聖示：出行、遷移、遠遊大吉，路途平安，在外得貴人。`},
{num:"第十一籤 上吉",poem:`失物原來未遠離，細尋近處可歸回。
安心莫急神相助，失而復得喜欣怡。`,exp:`聖示：失物可尋，多在身邊、家中、舊處，耐心即能找回。`},
{num:"第十二籤 上吉",poem:`官非口舌自消散，坦蕩心胸禍不侵。
息事寧人為上策，平安自在值千金。`,exp:`聖示：官司、是非、爭執皆可化解，退讓則吉，無橫禍。`},
{num:"第十三籤 上吉",poem:`善緣得子喜盈門，兒孫孝順福祿存。
後輩賢良承家業，一門和樂沐天恩。`,exp:`聖示：子息運吉，求子順利，子女聰慧，家庭添福。`},
{num:"第十四籤 上吉",poem:`平生積德感神恩，福氣綿延滿宅門。
善念存心天眷顧，禍消福至萬事尊。`,exp:`聖示：福分深厚，積德有報，善緣廣結，運勢越走越順。`},
{num:"第十五籤 上吉",poem:`修身養性樂天年，氣定神閒壽果全。
神恩護持無病患，安康長樂享天年。`,exp:`聖示：壽元綿長，老人安康，體質漸強，遠離重症。`},
{num:"第十六籤 中吉",poem:`門庭方位合天機，整理居家災厄離。
吉氣流通人順遂，陰邪不擾福相依。`,exp:`聖示：風水吉利，陽宅安穩，環境調整即可更旺。`},
{num:"第十七籤 中吉",poem:`緣份由來天注定，不須強求自然成。
隨心隨緣心安穩，好運相隨一路行。`,exp:`聖示：人際、感情宜隨緣，強求反累，順其自然最吉祥。`},
{num:"第十八籤 中吉",poem:`小人暗地莫輕心，謹言慎行守正身。
遠離是非邪惡友，自然平穩福臨門。`,exp:`聖示：防小人、防口舌，低調行事，不與人爭則無災。`},
{num:"第十九籤 中吉",poem:`山窮水盡疑無路，柳暗花明又一村。
危機自有轉機在，熬過風霜見朝暾。`,exp:`聖示：困境將過，絕處逢生，事業、財運即將轉好。`},
{num:"第二十籤 中吉",poem:`小災小厄不需驚，神護身邊自化平。
心正行端無懼怕，一家安稳享安寧。`,exp:`聖示：輕災易解，無大禍，祈福即可消煞納福。`},
{num:"第二十一籤 中吉",poem:`修心積善遠塵囂，靜養神清志氣高。
一念慈悲福自到，平安無事樂陶陶。`,exp:`聖示：宜修行、祈福、修心，心念正則萬事順。`},
{num:"第二十二籤 中吉",poem:`暗中積德不圖名，善果將來自顯榮。
福澤綿延家業旺，天公不負善心人。`,exp:`聖示：積陰德大吉，未來福報深厚，家運越來越旺。`},
{num:"第二十三籤 中吉",poem:`進退有機看時勢，不宜強行妄舉動。
審時度勢方為智，平安穩步福無窮。`,exp:`聖示：進退看時機，不宜衝動，三思而後行則吉。`},
{num:"第二十四籤 中吉",poem:`等待時來運自通，今朝忍耐莫匆匆。
堅持到底終能勝，雨過天青見彩虹。`,exp:`聖示：時機未到，宜等待、堅持，不可放棄。`},
{num:"第二十五籤 中吉",poem:`創業開張正合時，認真經營利資滋。
穩紮穩打終成業，財路開通福祿隨。`,exp:`聖示：創業、開店吉利，穩經營則財源廣進。`},
{num:"第二十六籤 中吉",poem:`合作相扶可成功，真心相待路相通。
誠信為先無猜忌，同心協力事昌隆。`,exp:`聖示：合夥、合作吉利，找對人則雙贏。`},
{num:"第二十七籤 中吉",poem:`文運昌隆智慧開，用心研習榜樣來。
考試求名皆順利，願望成真福自來。`,exp:`聖示：考試、升學、文書大吉，用心則能如願。`},
{num:"第二十八籤 中平",poem:`變動將臨不用愁，順應自然莫強求。
調整心身迎接變，好運將來在前頭。`,exp:`聖示：即將轉變，宜順應，不宜抗拒，變後更順。`},
{num:"第二十九籤 中平",poem:`平平稳稳度光陰，莫貪高冒莫貪心。
安分守己平安過，平淡之中有福臨。`,exp:`聖示：宜平穩、保守，不求大發，只求平安即是福。`},
{num:"第三十籤 中平",poem:`小小波折眼前過，忍一時風平浪靜。
熬過眼前煩惱事，後程順遂好光景。`,exp:`聖示：暫有小阻，忍耐即過，無大礙。`},
{num:"第三十一籤 中平",poem:`成功須靠苦耕耘，天上不會掉金銀。
腳踏實地終能得，努力前途自有春。`,exp:`聖示：成功靠努力，投機不可取，踏實最吉。`},
{num:"第三十二籤 中平",poem:`暫時失敗莫灰心，重整旗鼓再用心。
東山終有再起日，撥開雲霧見金針。`,exp:`聖示：暫時失利，可重整再出，未來必有反轉機會。`},
{num:"第三十三籤 中平",poem:`緣盡強留也無功，不如放下一身輕。
釋懷自有新天氣，往後前程更光明。`,exp:`聖示：感情、人事該放下則放下，捨得才有新機會。`},
{num:"第三十四籤 中平",poem:`堅持到底是良方，莫怕中途路漫長。
守得雲開見明月，苦盡甘來福满堂。`,exp:`聖示：堅持就能成功，中途不可放棄。`},
{num:"第三十五籤 中平",poem:`自力更生靠自身，莫貪依賴別人恩。
自己打拚根基穩，終能成功立乾坤。`,exp:`聖示：靠自己最吉，獨立奮鬥終能有成。`},
{num:"第三十六籤 中平",poem:`善惡終須有回報，今朝種因明日果。
多行善事多積福，禍遠福臨樂無多。`,exp:`聖示：因果循環，多行善則福到，行惡則禍來。`},
{num:"第三十七籤 中平",poem:`時機未到莫強求，靜待時來運自謀。
今日潛藏等待會，他年得志占鰲頭。`,exp:`聖示：時機未成熟，宜藏鋒、等待，不宜冒進。`},
{num:"第三十八籤 中平",poem:`時來運轉萬事通，否去泰來喜氣濃。
從此前程多順遂，一路福星伴君蹤。`,exp:`聖示：運勢即將轉好，衰運退、好運到。`},
{num:"第三十九籤 中平",poem:`歷盡風霜終得甜，苦盡甘來福祿全。
從此平安無煩惱，好運相隨年復年。`,exp:`聖示：先苦後甘，熬過難關即享清福。`},
{num:"第四十籤 中平",poem:`桃花正旺喜臨身，緣份相逢意氣親。
慎選良緣守正道，感情和美暖如春。`,exp:`聖示：桃花運旺，宜擇正緣，避免爛桃花。`},
{num:"第四十一籤 中平",poem:`婚姻天定好因緣，和睦相處樂無邊。
互敬互愛家興旺，白頭偕老福綿延。`,exp:`聖示：婚姻吉利，夫妻同心，家宅興隆。`},
{num:"第四十二籤 中平",poem:`家庭和睦福源長，老少平安喜氣揚。
手足同心家業旺，一門吉慶樂安康。`,exp:`聖示：家庭、兄弟、父母、子女皆和睦。`},
{num:"第四十三籤 中下",poem:`疾病纏身暫未安，調養身心莫亂竄。
尋醫祈福神相助，漸漸康復得平安。`,exp:`聖示：健康需保養，宜休息、醫治，祈福可加速痊癒。`},
{num:"第四十四籤 中下",poem:`醫藥須尋明醫師，安心調養莫遲疑。
神恩護持災厄退，身體康復有時機。`,exp:`聖示：醫治有效，找對方法即可恢復。`},
{num:"第四十五籤 中下",poem:`出行暫且慢安排，等待時機再出來。
若要強行恐有阻，平安等待最應該。`,exp:`聖示：暫不宜遠行、出門，延後更吉。`},
{num:"第四十六籤 中下",poem:`交易財來須小心，不宜輕率亂投資。
穩守為上防損失，等待時機最相宜。`,exp:`聖示：交易、投資宜保守，防破財。`},
{num:"第四十七籤 中下",poem:`合夥須防心不一，小人暗地耍陰機。
謹慎選擇防誤導，守身自穩最相宜。`,exp:`聖示：合夥小心，防對方失信、欺瞞。`},
{num:"第四十八籤 中下",poem:`求職暫未遇良機，繼續尋找莫心急。
充實自己等待會，終有良機屬於你。`,exp:`聖示：求職需等待，充實自己，機會即到。`},
{num:"第四十九籤 中下",poem:`升職暫且慢登程，努力表現再爭鋒。
時機一到自然得，莫急莫貪莫衝動。`,exp:`聖示：升職需等待，表現穩重即可得。`},
{num:"第五十籤 中下",poem:`開店暫緩莫慌張，整理規劃再登場。
穩定之後方開業，財源穩進免憂傷。`,exp:`聖示：開店宜延後，準備周全再開始。`},
{num:"第五十一籤 中下",poem:`投資理財防損耗，保守守財最為高。
莫信輕諾莫貪利，穩穩當當免煩惱。`,exp:`聖示：投資防破財，守財、儲蓄最吉。`},
{num:"第五十二籤 中下",poem:`房產交易慢斟酌，勿急簽約勿輕諾。
審慎評估方下手，避免將來有禍端。`,exp:`聖示：房產宜慢，審慎評估，不急不躁。`},
{num:"第五十三籤 中下",poem:`遺產爭執易傷情，以和為貴莫爭贏。
退讓一步平安過，家和自然福氣生。`,exp:`聖示：遺產宜和，退讓則吉，爭執則傷。`},
{num:"第五十四籤 中下",poem:`債務纏身暫未清，節流開源慢慢償。
莫借高利莫逃避，誠心面對得安康。`,exp:`聖示：債務可慢慢清，勿借非法、高利。`},
{num:"第五十五籤 中下",poem:`官司纏身暫未休，退讓和解莫強求。
息事寧人為上策，免得勞心又憂愁。`,exp:`聖示：官司宜和解，硬拼不利，退則吉。`},
{num:"第五十六籤 中下",poem:`口角是非常相擾，謹言慎行莫爭吵。
低調安靜遠閒語，自然平靜無煩惱。`,exp:`聖示：防口舌、爭執，少說話多做事。`},
{num:"第五十七籤 中下",poem:`朋友相交須小心，小人虛情莫認真。
擇善而從遠奸佞，真心相待得良賓。`,exp:`聖示：交友小心，防虛情假意、背叛。`},
{num:"第五十八籤 中下",poem:`兄弟之間防誤會，溝通不良易生非。
以和為貴多體諒，手足同心家業威。`,exp:`聖示：兄弟宜溝通，和睦則吉，爭執則損。`},
{num:"第五十九籤 中下",poem:`父母安康須孝順，用心照顧得神恩。
孝順能招福祿到，家和興旺滿門庭。`,exp:`聖示：孝順父母大吉，多關心長輩運更旺。`},
{num:"第六十籤 中下",poem:`子女教導須用心，寬嚴並進莫輕心。
培養品德根基穩，將來成才耀門庭。`,exp:`聖示：子女教育宜耐心，品德優先。`},
{num:"第六十一籤 中下",poem:`夫妻相處防爭執，互相包容最相宜。
莫讓冷戰傷情感，和睦方能福祿滋。`,exp:`聖示：夫妻防爭執，包容、溝通則吉。`},
{num:"第六十二籤 中下",poem:`天機不可亂猜測，順其自然最為宜。
安心等待神指引，禍福吉凶自有时。`,exp:`聖示：順天應人，勿強測天命，心安則吉。`},
{num:"第六十三籤 中下",poem:`事在人為莫聽天，努力耕耘改命運。
積善修身行正道，終能好運伴身前。`,exp:`聖示：人為努力可改運，積德最吉。`},
{num:"第六十四籤 中下",poem:`宿命由來天註定，行善積德可改移。
莫怨命運多坎坷，修心自有好時機。`,exp:`聖示：命運可改，多行善則轉吉。`},
{num:"第六十五籤 中下",poem:`後天努力可翻身，先天不足後天補。
勤奮向善神相助，終能成功展宏图。`,exp:`聖示：後天努力最重要，可扭轉劣勢。`},
{num:"第六十六籤 中下",poem:`人生選擇多歧路，審慎思考莫亂投。
選對方向前程好，一步之差萬里謀。`,exp:`聖示：選擇宜慎，勿衝動決定。`},
{num:"第六十七籤 中下",poem:`隨緣自在莫強求，得失由來不必憂。
心寬體健平安過，福氣自然到身頭。`,exp:`聖示：感情、人事隨緣，強求反苦。`},
{num:"第六十八籤 中下",poem:`機會要爭不靠等，勇敢出擊事方成。
莫待機會空流逝，把握今朝向前行。`,exp:`聖示：宜主動爭取，不可被動等待。`},
{num:"第六十九籤 中下",poem:`隱忍一時風浪過，莫衝動氣惹禍端。
低調安靜藏鋒芒，將來得志更輝煌。`,exp:`聖示：宜隱忍、低調，暫不與人爭。`},
{num:"第七十籤 中下",poem:`時機一到便爆發，厚積薄發事業嘉。
平日充實今朝用，一舉成功人人夸。`,exp:`聖示：長期準備，短期爆發，終能成功。`},
{num:"第七十一籤 中下",poem:`低調行事免招災，莫炫莫張莫亂來。
安分守己平安過，福氣深藏不用猜。`,exp:`聖示：低調最吉，防炫耀招小人。`},
{num:"第七十二籤 中下",poem:`高調行事易招非，謙虛謹慎最為宜。
收斂鋒芒防災厄，平安穩步福相依。`,exp:`聖示：不宜高調，謙虛則吉。`},
{num:"第七十三籤 中下",poem:`風險潛藏莫輕心，保守行事免傷身。
穩守為先防損失，等待平安再出征。`,exp:`聖示：防風險、防意外，保守最吉。`},
{num:"第七十四籤 中下",poem:`安穩度日即是福，莫貪冒險莫貪圖。
平平淡淡平安過，勝似黃金滿屋鋪。`,exp:`聖示：求穩不求險，平安勝過財富。`},
{num:"第七十五籤 下吉",poem:`福氣將臨不用愁，神恩護持解憂愁。
多行善事招天眷，從此平安樂悠悠。`,exp:`聖示：福氣漸臨，祈福、行善更旺。`},
{num:"第七十六籤 下吉",poem:`財氣漸通莫心急，穩守等待自然滋。
正財漸進無橫發，腳踏實地最相宜。`,exp:`聖示：財運漸好，正財穩進，不宜投機。`},
{num:"第七十七籤 下吉",poem:`名氣漸揚靠實力，莫求虛名莫求利。
踏實做事人敬重，終能光彩耀門楣。`,exp:`聖示：名氣靠實力，虛名不長久。`},
{num:"第七十八籤 下吉",poem:`好運將來慢慢臨，今朝忍耐莫灰心。
守得時來運轉至，從此前程萬里金。`,exp:`聖示：運勢轉好中，堅持即可。`},
{num:"第七十九籤 下吉",poem:`晦氣漸退災漸消，神恩護體樂逍遙。
祈福積善除陰煞，一家平安福祿饒。`,exp:`聖示：衰運退，好運來，祈福可加速轉運。`},
{num:"第八十籤 下吉",poem:`喜氣將臨家宅旺，好事將近莫慌忙。
安心等待佳音到，如意吉祥福满堂。`,exp:`聖示：喜事將近，家運漸旺。`},
{num:"第八十一籤 下吉",poem:`災難漸消不用驚，神尊護駕保安寧。
多行善事災厄退，從此平安享太平。`,exp:`聖示：災厄遠離，神護平安。`},
{num:"第八十二籤 下吉",poem:`陰邪化解災厄離，祈福清宅保安康。
心正行端神相助，一家和睦樂無疆。`,exp:`聖示：煞氣化解，祈福清宅大吉。`},
{num:"第八十三籤 下吉",poem:`孽緣漸退遠身旁，不再糾纏免憂傷。
放下從前迎新路，從此安然福氣長。`,exp:`聖示：孽緣遠離，適合放下、重新開始。`},
{num:"第八十四籤 下吉",poem:`良緣將近莫慌張，緣份相逢喜氣揚。
真心相待情長久，和美相伴樂安康。`,exp:`聖示：良緣將至，感情轉吉。`},
{num:"第八十五籤 下吉",poem:`正緣相逢在眼前，珍惜緣份莫拖延。
真心相伴無離散，白頭偕老福綿綿。`,exp:`聖示：正緣出現，宜把握。`},
{num:"第八十六籤 下吉",poem:`偏緣爛桃花易散，莫貪一時情感歡。
守住本心防誤導，穩定感情最平安。`,exp:`聖示：防爛桃花、偏緣，感情宜穩。`},
{num:"第八十七籤 下下",poem:`桃花煞擾情感亂，是非糾纏莫輕慢。
斷除孽緣守正道，方能平安免傷寒。`,exp:`聖示：爛桃花、桃花煞，宜斷捨離。`},
{num:"第八十八籤 下下",poem:`守財宜謹防破耗，莫亂花錢莫亂投。
節儉儲蓄為上策，免得將來苦憂愁。`,exp:`聖示：防破財、漏財，守財最吉。`},
{num:"第八十九籤 下下",poem:`守業安穩莫亂動，改變擴張易招凶。
穩守現狀平安過，等待時機再出鋒。`,exp:`聖示：宜守業，不宜擴張、變動。`},
{num:"第九十籤 下下",poem:`歸鄉順利莫遲疑，返家團圓最相宜。
遠行在外終須返，平安歸家樂怡怡。`,exp:`聖示：歸鄉、返家大吉，團圓吉祥。`},
{num:"第九十一籤 下下",poem:`定居安穩莫再遷，頻繁移動惹災纏。
穩定居住家運旺，平安度日樂無邊。`,exp:`聖示：宜定居，不宜頻繁遷移。`},
{num:"第九十二籤 下下",poem:`變化太多心不安，穩定情緒莫慌張。
減少變動守現狀，自然平靜免憂傷。`,exp:`聖示：減少變動，穩定最吉。`},
{num:"第九十三籤 下下",poem:`動中求靜保安康，紛擾之中守心腸。
莫被環境來影響，心定神閒福氣長。`,exp:`聖示：動中求靜，心穩則吉。`},
{num:"第九十四籤 下下",poem:`靜中求動覓生機，不可沉淪莫懈怠。
適度行動尋機會，終能翻身好運來。`,exp:`聖示：靜太久需動，找新機會。`},
{num:"第九十五籤 下下",poem:`絕境之中有生機，莫放棄兮莫悲啼。
熬過黑暗黎明至，枯木逢春再發枝。`,exp:`聖示：絕處逢生，不可放棄。`},
{num:"第九十六籤 下下",poem:`舊情已了莫強留，放下從前得自由。
新緣將近新開始，從此安然無憂愁。`,exp:`聖示：舊情宜放，新緣將至。`},
{num:"第九十七籤 下下",poem:`新歡相遇須慎思，莫因一時亂心智。
看清緣份真與假，穩定感情最相宜。`,exp:`聖示：新感情宜慎，勿衝動。`},
{num:"第九十八籤 下下",poem:`複緣無功莫強求，緣盡分飛免憂愁。
釋懷放下迎新路，往後前程更自由。`,exp:`聖示：複合無望，宜放下。`},
{num:"第九十九籤 下下",poem:`取捨之間須智慧，不該貪時莫強追。
捨得小利成大事，人生從此更光輝。`,exp:`聖示：有捨才有得，勿貪小利。`},
{num:"第一百籤 下下",poem:`得失由天莫強求，心寬體健度春秋。
平安即是無價寶，莫為浮雲白了頭。`,exp:`聖示：看淡得失，平安最重要。`},
{num:"第一百一籤 下下",poem:`前世因來今世果，多行善事改禍端。
積德修身神庇佑，災消福至樂安歡。`,exp:`聖示：因果報應，行善改運。`},
{num:"第一百二籤 下下",poem:`今生努力種福田，來日福祿綿綿延。
莫負今朝好時節，積善之家有餘年。`,exp:`聖示：今生積德，福報無窮。`},
{num:"第一百三籤 下下",poem:`未來前程靠自修，莫怨天兮莫怨尤。
努力向善行正道，終能好運到身頭。`,exp:`聖示：未來靠自己，努力則吉。`},
{num:"第一百四籤 下下",poem:`當下用心最要紧，莫將光陰付水流。
把握今朝行好事，將來福祿自然謀。`,exp:`聖示：珍惜當下，及時行善。`},
{num:"第一百五籤 下下",poem:`順勢而為莫逆行，逆天多勞總無成。
順應天時與地利，自然平穩福祿盈。`,exp:`聖示：順勢最吉，不可強行逆勢。`},
{num:"第一百六籤 下下",poem:`借力而行事易成，獨木難支大廈傾。
尋找貴人相扶助，終能成功揚美名。`,exp:`聖示：宜借力、找貴人，勿獨撐。`},
{num:"第一百七籤 下下",poem:`忍耐終能得好時，今朝磨練是天資。
熬過風霜花自綻，苦盡甘來福祿滋。`,exp:`聖示：忍耐最吉，磨練後必成功。`},
{num:"第一百零八籤 上上",poem:`王爺聖護萬事昌，災厄消除福满堂。
心正行端神眷顧，一家平安永安康。`,exp:`聖示：頂級大吉！王爺護駕，諸事圓滿，災消福至，平安大吉。`}
];

// 洗牌不重複
let lotPool = [...allLots];
function shuffle() {
    for(let i=lotPool.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [lotPool[i],lotPool[j]]=[lotPool[j],lotPool[i]];
    }
}
shuffle();

const stick = document.getElementById('stick');
const drawBtn = document.getElementById('drawBtn');
const result = document.getElementById('result');
const num = document.getElementById('num');
const poem = document.getElementById('poem');
const exp = document.getElementById('exp');

drawBtn.addEventListener('click',()=>{
    drawBtn.disabled = true;
    stick.classList.add('shake');
    setTimeout(()=>{
        stick.classList.remove('shake');
        if(lotPool.length===0) {
            lotPool = [...allLots];
            shuffle();
        }
        const selected = lotPool.pop();
        num.textContent = selected.num;
        poem.textContent = selected.poem;
        exp.textContent = selected.exp;
        result.style.display = 'block';
        drawBtn.disabled = false;
    },1200);
});
</script>
